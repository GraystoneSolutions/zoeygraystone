<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0f1e" />
  <title>Zoey — Graystone Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Variables ─────────────────────────────────────────────── */
    :root {
      --bg:          #0a0f1e;
      --surface:     #111827;
      --surface2:    #1a2235;
      --border:      #1e2d47;
      --accent:      #00d4ff;
      --accent2:     #0066ff;
      --accent-dim:  rgba(0, 212, 255, 0.12);
      --text:        #e2e8f0;
      --text-dim:    #64748b;
      --user-bg:     #0f2545;
      --zoey-bg:     #111827;
      --danger:      #ff4560;
      --success:     #00e5a0;
      --font-ui:     'Syne', sans-serif;
      --font-mono:   'Space Mono', monospace;
      --radius:      12px;
      --transition:  0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Animated grid background ──────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(10, 15, 30, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .zoey-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--bg);
      flex-shrink: 0;
      position: relative;
    }

    .zoey-avatar::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--accent), var(--accent2), var(--accent));
      z-index: -1;
      animation: spin 4s linear infinite;
      opacity: 0.6;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .header-info h1 {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: var(--text);
      line-height: 1;
    }

    .header-info .tagline {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .status-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Model toggle ──────────────────────────────────────────── */
    .model-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 22px;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 11px;
      transition: var(--transition);
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: var(--transition);
    }

    .toggle-switch input:checked + .toggle-track {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .toggle-switch input:checked + .toggle-track::after {
      left: calc(100% - 17px);
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* ── Messages area ─────────────────────────────────────────── */
    #messages {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Message bubbles ───────────────────────────────────────── */
    .message {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeSlideIn 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.zoey { align-self: flex-start; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .message.user .msg-avatar {
      background: var(--accent2);
      color: white;
    }

    .message.zoey .msg-avatar {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: var(--bg);
    }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .message.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid rgba(0, 102, 255, 0.3);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .message.zoey .msg-bubble {
      background: var(--zoey-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .msg-meta {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      padding: 0 4px;
    }

    .message.user .msg-meta { text-align: right; }

    .model-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 3px;
      margin-left: 6px;
    }

    .model-badge.mistral {
      background: rgba(255, 100, 50, 0.15);
      color: #ff8c5a;
      border: 1px solid rgba(255, 100, 50, 0.3);
    }

    .model-badge.claude {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(0, 212, 255, 0.3);
    }

    /* ── Typing indicator ──────────────────────────────────────── */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
    }

    .typing-indicator.visible { display: flex; }

    .typing-dots {
      display: flex;
      gap: 4px;
      background: var(--zoey-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: typing 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.2; transform: scale(0.8); }
      30%            { opacity: 1;   transform: scale(1.2); }
    }

    /* ── Welcome screen ────────────────────────────────────────── */
    #welcome {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #welcome.hidden { opacity: 0; }

    .welcome-logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 700;
      color: var(--bg);
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.3); }
      50%       { box-shadow: 0 0 60px rgba(0, 212, 255, 0.5); }
    }

    .welcome-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .welcome-title span { color: var(--accent); }

    .welcome-sub {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      line-height: 1.8;
    }

    /* ── Input area ────────────────────────────────────────────── */
    .input-area {
      position: relative;
      z-index: 10;
      padding: 12px 16px 16px;
      background: rgba(10, 15, 30, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #userInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      padding: 12px 16px;
      resize: none;
      min-height: 46px;
      max-height: 140px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      line-height: 1.5;
    }

    #userInput::placeholder { color: var(--text-dim); }

    #userInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    }

    #sendBtn {
      width: 46px;
      height: 46px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity var(--transition), transform var(--transition);
    }

    #sendBtn:hover  { opacity: 0.85; transform: scale(1.05); }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #sendBtn svg { width: 18px; height: 18px; fill: white; }

    .input-hint {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      text-align: center;
      margin-top: 8px;
      letter-spacing: 0.05em;
    }

    /* ── Error toast ───────────────────────────────────────────── */
    #errorToast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255, 69, 96, 0.15);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 10px 20px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 12px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    #errorToast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 480px) {
      header { padding: 12px 14px; }
      .header-info h1 { font-size: 14px; }
      .model-toggle .toggle-label { display: none; }
      #messages { padding: 14px 12px; gap: 12px; }
      .message { max-width: 94%; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="zoey-avatar">Z</div>
      <div class="header-info">
        <h1>ZOEY</h1>
        <div class="tagline">GRAYSTONE SOLUTIONS · AI ASSISTANT</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:16px;">
      <div class="model-toggle">
        <span class="toggle-label">ADVANCED</span>
        <label class="toggle-switch">
          <input type="checkbox" id="modeToggle" />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="status-dot" id="statusDot">ONLINE</div>
    </div>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div id="welcome">
      <div class="welcome-logo">Z</div>
      <div class="welcome-title">Hello, I'm <span>Zoey</span></div>
      <div class="welcome-sub">
        GRAYSTONE SOLUTIONS AI ASSISTANT<br/>
        CYBERSECURITY · AI GOVERNANCE · COMPLIANCE<br/><br/>
        HOW CAN I HELP YOU TODAY?
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="msg-avatar" style="background: linear-gradient(135deg, #0066ff, #00d4ff); color: #0a0f1e; font-family: 'Space Mono'; font-size:10px; font-weight:700; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;">Z</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="userInput"
        placeholder="Ask Zoey anything..."
        rows="1"
        autocomplete="off"
        autocorrect="off"
        spellcheck="true"
      ></textarea>
      <button id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">ENTER TO SEND · SHIFT+ENTER FOR NEW LINE · TOGGLE FOR CLAUDE MODE</div>
  </div>

  <!-- Error Toast -->
  <div id="errorToast"></div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────────
    const API_BASE   = window.location.origin;
    const SESSION_ID = 'session_' + Math.random().toString(36).slice(2, 10);

    // ── Elements ────────────────────────────────────────────────────────────────
    const messagesEl  = document.getElementById('messages');
    const inputEl     = document.getElementById('userInput');
    const sendBtn     = document.getElementById('sendBtn');
    const modeToggle  = document.getElementById('modeToggle');
    const typingEl    = document.getElementById('typingIndicator');
    const welcomeEl   = document.getElementById('welcome');
    const errorToast  = document.getElementById('errorToast');
    const statusDot   = document.getElementById('statusDot');

    let welcomeVisible = true;
    let isLoading      = false;

    // ── Health check ─────────────────────────────────────────────────────────────
    async function checkHealth() {
      try {
        const res = await fetch(`${API_BASE}/health`);
        if (!res.ok) throw new Error();
        statusDot.textContent = 'ONLINE';
        statusDot.style.setProperty('--dot-color', 'var(--success)');
      } catch {
        statusDot.textContent = 'OFFLINE';
      }
    }

    checkHealth();

    // ── Auto-resize textarea ─────────────────────────────────────────────────────
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    });

    // ── Keyboard handler ─────────────────────────────────────────────────────────
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // ── Send message ─────────────────────────────────────────────────────────────
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      // Hide welcome
      if (welcomeVisible) {
        welcomeEl.classList.add('hidden');
        welcomeVisible = false;
      }

      // Add user bubble
      appendMessage('user', text, null);

      // Clear input
      inputEl.value = '';
      inputEl.style.height = 'auto';

      // Show typing indicator
      setLoading(true);

      const mode = modeToggle.checked ? 'advanced' : 'standard';

      try {
        const res = await fetch(`${API_BASE}/chat`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ message: text, session_id: SESSION_ID, mode })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();
        appendMessage('zoey', data.reply, data.model_used);

      } catch (err) {
        showError(err.message || 'Could not reach Zoey. Is the backend running?');
      } finally {
        setLoading(false);
      }
    }

    // ── Append a message bubble ──────────────────────────────────────────────────
    function appendMessage(role, text, modelUsed) {
      const isUser = role === 'user';
      const initials = isUser ? 'B' : 'Z';
      const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      let badgeHtml = '';
      if (!isUser && modelUsed) {
        const cls = modelUsed.includes('claude') ? 'claude' : 'mistral';
        const label = modelUsed.includes('claude') ? 'CLAUDE' : 'MISTRAL';
        badgeHtml = `<span class="model-badge ${cls}">${label}</span>`;
      }

      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'zoey'}`;
      div.innerHTML = `
        <div class="msg-avatar">${initials}</div>
        <div class="msg-content">
          <div class="msg-bubble">${escapeHtml(text)}</div>
          <div class="msg-meta">${timeStr}${badgeHtml}</div>
        </div>
      `;

      // Insert before typing indicator
      messagesEl.insertBefore(div, typingEl);
      scrollToBottom();
    }

    // ── Helpers ──────────────────────────────────────────────────────────────────
    function setLoading(state) {
      isLoading = state;
      sendBtn.disabled = state;
      typingEl.classList.toggle('visible', state);
      if (state) scrollToBottom();
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/\n/g, '<br/>');
    }

    function showError(msg) {
      errorToast.textContent = '⚠ ' + msg;
      errorToast.classList.add('show');
      setTimeout(() => errorToast.classList.remove('show'), 4000);
    }
  </script>
</body>
</html>
